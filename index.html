<!doctype html>
<html lang="pt-br">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quero Café Bar</title>
  </head>
  <body>

      <ion-router id="main-router" use-hash="false">

    </ion-app>
    <script type="module" src="/src/main.js"></script>
  </body>
